<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <script type="text/javascript" src="../../../js/script.js" defer></script>
        <title>Grades</title>

        <link rel="stylesheet" href="../../../css/style1.css">
    </head>


    <body class="page">
        <header>

            <div class="head-header">
                <div class="logo">
                    <img src="../../../img/Logo-Efrei-Blanc.png" class="logoefrei" alt="Logo Efrei">
                    <p>Computer<br>Department</p>
                </div>
                <div class="profile">
                    <img src="../../../img/avatar1.jpg" class="avatar" alt="Avatar">
                    <span>Houari Houssam</span>
                    <button type="button" id="logout" onclick="logout()">Log out</button>
                </div>
            </div>


            <div class="navigation">
            <ul class="footer-nav">
                <li><a href="home.html">Home</a></li>
                <li><a href="planning.html">Planning</a></li>
                <li><a href="prof.html">Professors</a></li>
                <li><a href="notes.html">Grades</a></li>
                <li ><a href="gacha.html">★</a></li>
            </ul>
            </div>
    
        </header>

        
        <main class="grades-section">
            <h1 class="page-title">Grades</h1>
            
            <div class="search-container">
                <label for="studentSearch" class="search-label">Student name:</label>
                <input type="text" id="studentSearch" placeholder="Ex: Amir Chachoui">
                <button type="button" class="submit-btn" onclick="searchStudent()">Search</button>
            </div>

            <p id="errorMessage" class="error-msg"></p>

            <div id="gradesWorkspace" class="grades-workspace" style="display: none;">
                
                <div class="form-panel">
                    <h2 id="currentStudentTitle">Add a grade</h2>
                    <form id="gradeForm" onsubmit="addGrade(event)">
                        
                        <div class="input-group">
                            <label for="moduleSelect">Module:</label>
                            <select id="moduleSelect" required>
                                <option value="" disabled selected>Select a module</option>
                                <option value="Algorithms and Data Structures">Algorithms and Data Structures</option>
                                <option value="Database 1">Database 1</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Networks 1">Networks 1</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="examSelect">Exam:</label>
                            <select id="examSelect" required>
                                <option value="" disabled selected>Select an exam</option>
                                <option value="DE">DE</option>
                                <option value="CE">CE</option>
                                <option value="TP">TP</option>
                                <option value="TD">TD</option>
                            </select>
                        </div>

                        <div class="input-group">
                            <label for="gradeInput">Grade:</label>
                            <input type="number" id="gradeInput" min="0" max="20" step="0.1" placeholder="/20" required>
                        </div>

                        <div class="input-group comment-group">
                            <label for="commentInput">Commentary:</label>
                            <textarea id="commentInput" rows="4" placeholder="Enter a commentary..."></textarea>
                        </div>

                        <div class="submit-container">
                            <button type="submit" class="submit-btn">Submit</button>
                        </div>
                    </form>
                </div>

                <div class="list-panel">
                    <div class="grades-scroll-box" id="gradesList">
                    </div>
                </div>

            </div>
        </main>

        
        <footer class="footer-flex">
            <p id="text-footer-flex">©2026 Efrei | <a href="aboutus.html">About us</a> | <a href="https://www.efrei.fr/"> Efrei. fr</a></p>
        </footer>
    </body>
</html>
